<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="main.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>A Daily Dose of Erudition</h1>

      <div class="row">
        <a
          href="https://linktr.ee/kentn"
          target="_blank"
        >
          <img
            src="/assets/meadow_circle_bw.png"
            class="logo tauri"
            alt="Kenntn"
          />
        </a>
      </div>
      <p>Click on the my logo to learn more about me!</p>

      <form class="row" id="greet-form">
        <input id="greet-input" placeholder="Enter a name..." />
        <button type="submit">Greet</button>
      </form>

      <p id="greet-msg"></p>
      <div class="column">
      
        <!-- Today's Quote, Art Quotes Funny Quotes Love Quotes Nature Quotes -->
      <p>Each option holds something new everyday!</p>
      <div class="button-row">
      <button id="fun-fact-btn">Fun Fact</button>
      
      <button id="wotd-btn">Word of the Day</button>
      <p></p></p>
      <button id="quote-btn">Today's Quotes</button>
      <button id="art-btn">Art</button>
      <button id="funny-btn">Funny!</button>
      <button id="love-btn">Love</button>
      <button id="nature-btn">Nature</button>
      <p id="fun-fact-msg"></p>
      </div>
      
      
      
      
    </main>
  </body>
</html>
